name: CI

# Independent clean-machine proof (PCC assurance layer). On every push, a fresh
# GitHub-hosted machine installs the app from the lockfile and runs the full test
# suite + a dependency audit. This is the EXECUTION proof that a code review (GPT/
# Codex reading the diff) structurally cannot give — see DECISION-105.
#
# Deliberately NARROW (no releases, packaging, coverage dashboards, badges, or
# matrix builds): the point is honest proof the software runs, not a CI project.
# Runner is windows-latest on purpose — it matches the dev OS and the PowerShell
# (pwsh) script-contract tests, and lets Electron run without a virtual-display
# workaround. The worker/verifier are faked in tests (offline, deterministic), so
# no network, API key, or Claude/Codex usage is needed.

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

# Least privilege: this workflow only reads the repo to run tests. It never
# writes contents, issues, PRs, or packages, so the token gets read-only scope.
permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: app
    steps:
      # Third-party actions are pinned to a full-length commit SHA (supply-chain
      # hardening): a moving tag like @v4 can be re-pointed at malicious code,
      # a specific commit cannot. The trailing comment shows the trusted major
      # version the SHA corresponds to; Dependabot (github-actions ecosystem)
      # bumps the SHA + comment together when a new release lands.
      - name: Check out the repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4 (v4.3.1)
        with:
          fetch-depth: 0   # full history: the trailer audit re-derives each commit's diff vs its recorded base

      # Decision records must match the locked MADR standard (front matter + the five
      # required sections incl. Confirmation + Engagement). Fast, deterministic, no deps —
      # a malformed ADR fails here before the expensive install + Electron suite run.
      - name: Validate ADR format (docs/adr/*.md)
        working-directory: ${{ github.workspace }}   # repo-root script; job default is app/
        run: pwsh -NoProfile -File scripts/check-adr.ps1

      # Governor durability (ADR-0007) + judge-from-trusted-main (ADR-0008): every NON-MERGE
      # tagged-crucial (T0/T1) commit new on this branch MUST carry a valid, diff-bound
      # `Verified-Receipt` trailer whose diff_id re-derives from the commit's actual content. Catches
      # a local `--no-verify` skip and a malformed / mismatched / invalid-BYPASS trailer — it does NOT
      # catch a correctly-bound fabricated PASS (accepted residue, ADR-0007). Server-side half of the
      # gate; un-bypassable ONLY IF branch protection is active + required and work enters via PR.
      # T2/T3/T4 commits need none.
      #
      # SELF-MODIFYING-ENFORCEMENT DEFENSE (ADR-0008): the auditor + its libs + the classifier + the
      # stakes manifest are run from a detached `origin/main` WORKTREE (the trusted copy), NOT the PR
      # checkout — so a PR cannot weaken the judge in its own tree and have the weakened judge approve
      # itself. A worktree shares the object store, so main's scripts inspect the PR's fetched commits.
      #
      # The audit RANGE is computed here in trusted bash from GitHub's event context using EXPLICIT
      # SHAs (never a script run from the worktree — a detached worktree's literal `HEAD` resolves to
      # `main`, which silently produced an EMPTY range/vacuous pass; and running the resolver from the
      # PR checkout would let a PR narrow its own audit range). The auditor's `-Range` interface is
      # stable, so this also avoids a bootstrap where a resolver-interface change cannot judge its own
      # introducing PR. `scripts/resolve-audit-range.ps1` remains the unit-tested reference for these
      # same range rules (fail-closed on an empty push-to-default range); this bash mirrors them and is
      # proven by the live push + pull_request CI runs.
      #
      # HONEST LIMIT: `ci.yml` itself still runs from the PR branch, so a PR that edits THIS file is
      # closed only by owner-side required review (O2) + branch protection (O1) — see ADR-0008.
      - name: Audit verification trailers (from trusted origin/main; ADR-0007 + ADR-0008)
        working-directory: ${{ github.workspace }}
        shell: bash
        run: |
          git fetch --no-tags origin main:refs/remotes/origin/main || git fetch --no-tags origin main
          EVENT="${{ github.event_name }}"; REF_NAME="${{ github.ref_name }}"
          BEFORE="${{ github.event.before }}"; SHA="${{ github.sha }}"
          ZERO="0000000000000000000000000000000000000000"
          # The PR's REAL head commit: github.sha is the ephemeral merge commit on a pull_request, so
          # use head.sha there; on a push there is no PR object, so github.sha IS the pushed commit.
          HEAD_SHA="$SHA"
          if [ "$EVENT" = "pull_request" ]; then HEAD_SHA="${{ github.event.pull_request.head.sha }}"; fi
          if [ "$EVENT" = "push" ] && [ "$REF_NAME" = "main" ]; then
            # Direct push to the default branch: audit the push's REAL range; NEVER pass vacuously.
            if [ -z "$BEFORE" ] || [ "$BEFORE" = "$ZERO" ]; then
              echo "push to main with no usable before-SHA — failing closed"; exit 1
            fi
            RANGE="$BEFORE..$SHA"
            if [ -z "$(git rev-list "$RANGE" 2>/dev/null)" ]; then
              echo "push to main resolved to an EMPTY range ($RANGE) — failing closed (never audit vacuously)"; exit 1
            fi
          else
            # PR / dispatch / feature-branch push: audit merge-base(origin/main, head)..head (explicit SHAs).
            BASE="$(git merge-base origin/main "$HEAD_SHA" 2>/dev/null)"
            if [ -z "$BASE" ]; then echo "cannot compute merge-base for $HEAD_SHA — failing closed"; exit 1; fi
            RANGE="$BASE..$HEAD_SHA"
          fi
          echo "auditing $RANGE with the governor from trusted origin/main"
          TRUSTED="${RUNNER_TEMP:-/tmp}/trusted-governor"
          rm -rf "$TRUSTED"
          git worktree add --detach "$TRUSTED" origin/main
          set +e
          pwsh -NoProfile -File "$TRUSTED/scripts/audit-verification-trailers.ps1" -Range "$RANGE"
          audit_rc=$?
          set -e
          git worktree remove --force "$TRUSTED" || true
          exit $audit_rc

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4 (v4.4.0)
        with:
          node-version: "20"

      - name: Install from lockfile (clean)
        run: npm ci

      # Static hallucination check: `no-undef` catches references to things that don't
      # exist (undefined identifiers/calls) — the class plain JS + no type-checking would
      # let slip until runtime. Fast; fails before the Electron suite.
      - name: Lint (no-undef hallucination check)
        run: npm run lint

      # The node:test unit suite (tests/unit/*.test.js: atomic-store, chat-store,
      # chat-migrate, chat-bootstrap, chat-service — the data-integrity primitives)
      # runs ONLY under `node --test`. Playwright's `npm test` does NOT pick up
      # *.test.js, so without this step those core units get no CI proof. Runs
      # first: it is fast and deterministic, so a real regression fails fast before
      # the slower Electron suite.
      - name: Run the node:test unit suite (data-integrity primitives)
        run: npm run test:unit

      # `npm test` is the CANONICAL guarded entrypoint (tools/guarded-test.js -> scripts/run-guarded.ps1):
      # the long Electron suite runs THROUGH the forward-progress guard, so a wedged launch is aborted
      # with a machine-readable verdict instead of burning the whole job timeout on a dead process.
      - name: Run the full test suite (Electron E2E + IPC + PowerShell scripts), guarded
        run: npm test

      - name: Dependency vulnerability audit (fail only on high/critical)
        run: npm audit --audit-level=high
